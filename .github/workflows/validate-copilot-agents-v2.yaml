name: Validate Copilot Agents V2

on:
  workflow_dispatch:
    inputs:
      files:
        description: "Optional space-separated list of agent files to validate"
        required: false
        type: string
  workflow_call:
    inputs:
      files:
        description: "Optional space-separated list of agent files to validate"
        required: false
        type: string
      pr_number:
        description: "PR number to post the comment on (pass github.event.pull_request.number from the caller)"
        required: false
        type: number
  pull_request:
    paths:
      - "agents/**"
      - ".github/agents/**"
      - ".github/skills/**"
      - ".github/actions/validate-agents/**"
      - "scripts/**"
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - "agents/**"
      - ".github/agents/**"
      - ".github/skills/**"
      - ".github/actions/validate-agents/**"
      - "scripts/**"
      - ".github/workflows/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-agents:
    name: Validate agent profiles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      # Removed: cross-repo checkout and token usage

      - name: Get changed agent files
        id: changed-files
        uses: actions/github-script@v7
        with:
          script: |
            const isAgentFile = (filename) => /^(agents|\.github\/agents)\/.*\.md$/.test(filename);
            const isSkillFile = (filename) => /skills\/.+/.test(filename);
            let changedFiles = [];

            if (context.eventName === 'pull_request') {
              let page = 1;
              let hasMore = true;
              while (hasMore) {
                const { data: files } = await github.rest.pulls.listFiles({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.issue.number,
                  per_page: 100,
                  page: page,
                });
                changedFiles = changedFiles.concat(files.map(f => f.filename));
                hasMore = files.length === 100;
                page++;
              }
            } else if (context.eventName === 'workflow_call' && `${{ inputs.pr_number || '' }}`.trim() !== '') {
              let page = 1;
              let hasMore = true;
              while (hasMore) {
                const { data: files } = await github.rest.pulls.listFiles({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: Number(`${{ inputs.pr_number }}`),
                  per_page: 100,
                  page: page,
                });
                changedFiles = changedFiles.concat(files.map(f => f.filename));
                hasMore = files.length === 100;
                page++;
              }
            } else if (context.eventName === 'push') {
              const before = context.payload.before;
              const after = context.payload.after;

              if (before && after) {
                const { data: compare } = await github.rest.repos.compareCommits({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  base: before,
                  head: after,
                });
                changedFiles = (compare.files || []).map(f => f.filename);
              }
            }

            const inputFiles = `${{ inputs.files || '' }}`.trim();
            if (inputFiles !== '' && (context.eventName === 'workflow_call' || context.eventName === 'workflow_dispatch')) {
              const explicitFiles = inputFiles.split(/\s+/);
              changedFiles = Array.from(new Set([...changedFiles, ...explicitFiles]));
            }

            const agentFiles = changedFiles.filter(isAgentFile);
            const skillFiles = changedFiles.filter(isSkillFile);

            console.log('Changed agent files:', agentFiles);
            console.log('Changed skill files:', skillFiles);
            core.setOutput('files', agentFiles.join(' '));
            core.setOutput('skill_files', skillFiles.join(' '));

      - name: Run gh skill publish --dry-run validation
        id: gh_skill_validate
        if: steps.changed-files.outputs.skill_files != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SKILL_FILES="${{ steps.changed-files.outputs.skill_files }}"
          # Extract unique skill names from changed file paths
          SKILL_DIRS=$(echo "$SKILL_FILES" | tr ' ' '\n' | sed -n 's|.*skills/\([^/]*\)/.*|\1|p' | sort -u)
          if [ -z "$SKILL_DIRS" ]; then
            echo "No skill directories identified. Skipping."
            exit 0
          fi
          echo "Changed skills detected: $SKILL_DIRS"
          FAILED=0
          for SKILL in $SKILL_DIRS; do
            SKILL_PATH=".github/skills/$SKILL"
            if [ -d "$SKILL_PATH" ]; then
              echo "--- Validating skill: $SKILL ---"
              (cd "$SKILL_PATH" && gh skill publish --dry-run) || { echo "❌ Skill '$SKILL' failed validation."; FAILED=1; }
            else
              echo "⚠️ Directory '$SKILL_PATH' not found, skipping."
            fi
          done
          if [ $FAILED -ne 0 ]; then exit 1; fi
        continue-on-error: true

      - name: Run validator (composite action local)
        id: validate_local
        if: github.repository == 'fractalcopilot/gh-copilot-adoption-framework' && (steps.changed-files.outputs.files != '' || steps.changed-files.outputs.skill_files != '')
        uses: ./.github/actions/validate-agents
        with:
          files: ${{ steps.changed-files.outputs.files }}
          skill_files: ${{ steps.changed-files.outputs.skill_files }}
        continue-on-error: true

      - name: Run validator (composite action reusable)
        id: validate_reusable
        if: github.repository != 'fractalcopilot/gh-copilot-adoption-framework' && (steps.changed-files.outputs.files != '' || steps.changed-files.outputs.skill_files != '')
        uses: fractalcopilot/gh-copilot-adoption-framework/.github/actions/validate-agents@main
        with:
          files: ${{ steps.changed-files.outputs.files }}
          skill_files: ${{ steps.changed-files.outputs.skill_files }}
        continue-on-error: true

      - name: Skip validation (no relevant file changes)
        if: steps.changed-files.outputs.files == '' && steps.changed-files.outputs.skill_files == ''
        run: echo "No changed agent or skill files detected; validation skipped."
      - name: Post PR comment
        if: always() && (github.event_name == 'pull_request' || github.event_name == 'workflow_call') && (steps.changed-files.outputs.files != '' || steps.changed-files.outputs.skill_files != '')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const sections = [];
            const snapshotRows = [];

            const extractStatus = (content) => {
              if (content.includes('> [!CAUTION]')) {
                return '❌ Action needed';
              }
              if (content.includes('> [!WARNING]')) {
                return '⚠️ Review';
              }
              if (content.includes('> [!NOTE]')) {
                return '✅ Pass';
              }
              if (content.includes('❌')) {
                return '❌ Action needed';
              }
              if (content.includes('⚠️')) {
                return '⚠️ Review';
              }
              return 'ℹ️ Info';
            };

            const extractSummaryLine = (content) => {
              const lines = content.split('\n').map(l => l.trim()).filter(Boolean);
              const boldSummary = lines.find(l => /^\*\*.*\*\*\s*—/.test(l));
              if (boldSummary) {
                return boldSummary;
              }

              const overallSummaryIndex = lines.findIndex(l => /^###\s+Overall\s+Summary$/i.test(l));
              if (overallSummaryIndex >= 0 && lines[overallSummaryIndex + 1]) {
                return lines[overallSummaryIndex + 1];
              }

              const summaryIndex = lines.findIndex(l => /^###\s+Summary$/i.test(l));
              if (summaryIndex >= 0 && lines[summaryIndex + 1]) {
                return lines[summaryIndex + 1];
              }

              return 'Summary available in expanded section.';
            };

            const addCollapsibleSection = (title, path) => {
              if (!fs.existsSync(path)) {
                return;
              }

              const content = fs.readFileSync(path, 'utf8');
              const status = extractStatus(content);
              const summary = extractSummaryLine(content);

              snapshotRows.push(`| ${title} | ${status} | ${summary.replace(/\|/g, '\\|')} |`);

              sections.push(
                `<details>\n<summary><strong>${title}</strong> — ${status}</summary>\n\n${content}\n\n</details>`
              );
            };

            addCollapsibleSection('Copilot Agent Validation Results', 'validation-report.md');
            addCollapsibleSection('Prompt Injection Results', 'prompt-injection-report.md');
            addCollapsibleSection('Token Usage Analysis', 'token-analysis-report.md');
            addCollapsibleSection('Skill Benchmark Results', 'skill_benchmark_report.md');

            if (sections.length === 0) {
              sections.push('Validation completed, but no markdown report files were found.');
            }

            const snapshot = snapshotRows.length
              ? [
                  '## Quick Summary',
                  '',
                  '| Report | Status | Summary |',
                  '|--------|--------|---------|',
                  ...snapshotRows,
                ].join('\n')
              : '';

            const report = [snapshot, sections.join('\n\n---\n\n')].filter(Boolean).join('\n\n');
            const marker = '<!-- copilot-agent-validation -->';
            const body = `${marker}\n${report}`;

            const prNumber = context.issue.number || ${{ inputs.pr_number || 0 }};
            if (!prNumber) {
              console.log('No PR number available; skipping comment.');
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
      - name: Fail if validation failed
        if: steps.validate_local.outcome == 'failure' || steps.validate_reusable.outcome == 'failure'
        run: exit 1

      - name: Upload validation artifacts
        if: always() && (steps.changed-files.outputs.files != '' || steps.changed-files.outputs.skill_files != '')
        uses: actions/upload-artifact@v4
        with:
          name: copilot-validation-reports
          if-no-files-found: ignore
          path: |
            validation-report.md
            prompt-injection-report.md
            token-analysis-report.md
            skill_benchmark_report.md
