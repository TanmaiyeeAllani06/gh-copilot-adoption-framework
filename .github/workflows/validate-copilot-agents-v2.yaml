name: Validate Copilot Agents V2

on:
  workflow_dispatch:
    inputs:
      files:
        description: "Optional space-separated list of agent files to validate"
        required: false
        type: string
  workflow_call:
    inputs:
      files:
        description: "Optional space-separated list of agent files to validate"
        required: false
        type: string
      pr_number:
        description: "PR number to post the comment on"
        required: false
        type: number
  pull_request:
    paths:
      - "agents/**"
      - ".github/agents/**"
      - ".github/skills/**"
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - "agents/**"
      - ".github/agents/**"
      - ".github/skills/**"
      - ".github/workflows/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-agents:
    name: Validate agent profiles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Get changed agent files
        id: changed-files
        uses: actions/github-script@v7
        with:
          script: |
            const isAgentFile = (filename) => /^(agents|\.github\/agents)\/.*\.md$/.test(filename);
            const isSkillFile = (filename) => /skills\/.+/.test(filename);
            let changedFiles = [];

            if (context.eventName === 'pull_request') {
              let page = 1;
              let hasMore = true;
              while (hasMore) {
                const { data: files } = await github.rest.pulls.listFiles({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.issue.number,
                  per_page: 100,
                  page: page,
                });
                changedFiles = changedFiles.concat(files.map(f => f.filename));
                hasMore = files.length === 100;
                page++;
              }
            } else if (context.eventName === 'workflow_call' && `${{ inputs.pr_number || '' }}`.trim() !== '') {
              let page = 1;
              let hasMore = true;
              while (hasMore) {
                const { data: files } = await github.rest.pulls.listFiles({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: Number(`${{ inputs.pr_number }}`),
                  per_page: 100,
                  page: page,
                });
                changedFiles = changedFiles.concat(files.map(f => f.filename));
                hasMore = files.length === 100;
                page++;
              }
            } else if (context.eventName === 'push') {
              const before = context.payload.before;
              const after = context.payload.after;

              if (before && after) {
                const { data: compare } = await github.rest.repos.compareCommits({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  base: before,
                  head: after,
                });
                changedFiles = (compare.files || []).map(f => f.filename);
              }
            }

            const inputFiles = `${{ inputs.files || '' }}`.trim();
            if (inputFiles !== '' && (context.eventName === 'workflow_call' || context.eventName === 'workflow_dispatch')) {
              const explicitFiles = inputFiles.split(/\s+/);
              changedFiles = Array.from(new Set([...changedFiles, ...explicitFiles]));
            }

            const agentFiles = changedFiles.filter(isAgentFile);
            const skillFiles = changedFiles.filter(isSkillFile);

            console.log('Changed agent files:', agentFiles);
            console.log('Changed skill files:', skillFiles);
            core.setOutput('files', agentFiles.join(' '));
            core.setOutput('skill_files', skillFiles.join(' '));

      - name: Validate skills with gh skill publish --dry-run
        id: validate_skills_cli
        if: steps.changed-files.outputs.skill_files != ''
        run: |
          report="skill-cli-validation-report.md"
          echo "# Skill Validation — GitHub CLI Dry-Run" > "$report"
          echo "" >> "$report"
          echo "**Command used:** \`gh skill publish --dry-run\`" >> "$report"
          echo "" >> "$report"
          
          failed=0
          for skill_file in ${{ steps.changed-files.outputs.skill_files }}; do
            skill_dir=$(dirname "$skill_file")
            skill_name=$(basename "$skill_dir")
            
            echo "## $skill_name" >> "$report"
            cd "$skill_dir"
            if gh skill publish --dry-run >> "$report" 2>&1; then
              echo "✅ PASSED" >> "$report"
            else
              echo "❌ FAILED" >> "$report"
              ((failed++))
            fi
            echo "" >> "$report"
            cd - > /dev/null
          done
          
          if [ $failed -gt 0 ]; then
            exit 1
          fi

      - name: Skip validation (no relevant file changes)
        if: steps.changed-files.outputs.files == '' && steps.changed-files.outputs.skill_files == ''
        run: echo "No changed agent or skill files detected; validation skipped."

      - name: Post PR comment
        if: always() && (github.event_name == 'pull_request' || github.event_name == 'workflow_call') && (steps.changed-files.outputs.files != '' || steps.changed-files.outputs.skill_files != '')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const sections = [];
            
            if (fs.existsSync('skill-cli-validation-report.md')) {
              const content = fs.readFileSync('skill-cli-validation-report.md', 'utf8');
              sections.push(content);
            }

            if (sections.length === 0) {
              sections.push('Validation completed.');
            }

            const body = `<!-- validation-reports -->\n${sections.join('\n\n')}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('<!-- validation-reports -->'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload validation artifacts
        if: always() && steps.changed-files.outputs.skill_files != ''
        uses: actions/upload-artifact@v4
        with:
          name: copilot-validation-reports
          if-no-files-found: ignore
          path: skill-cli-validation-report.md

      - name: Fail if validation failed
        if: failure() && steps.validate_skills_cli.outcome == 'failure'
        run: exit 1
